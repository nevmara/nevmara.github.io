    <!-- Material Design 3 (2026) Değişkenleri & Tailwind Yapılandırması -->
    <style>
        :root {
            /* Light Theme MD3 Tokens - Refined for 2026 */
            --md-sys-color-primary: #6750A4;
            --md-sys-color-on-primary: #FFFFFF;
            --md-sys-color-primary-container: #EADDFF;
            --md-sys-color-on-primary-container: #21005D;
            
            --md-sys-color-secondary: #625B71;
            --md-sys-color-on-secondary: #FFFFFF;
            --md-sys-color-secondary-container: #E8DEF8;
            --md-sys-color-on-secondary-container: #1D192B;

            --md-sys-color-tertiary: #7D5260;
            --md-sys-color-on-tertiary: #FFFFFF;
            --md-sys-color-tertiary-container: #FFD8E4;
            --md-sys-color-on-tertiary-container: #31111D;

            --md-sys-color-surface: #FEF7FF;
            --md-sys-color-on-surface: #1D1B20;
            --md-sys-color-surface-variant: #E7E0EC;
            --md-sys-color-on-surface-variant: #49454F;
            
            /* Enhanced Surface Tonal Elevation */
            --md-sys-color-surface-container-lowest: #FFFFFF;
            --md-sys-color-surface-container-low: #F7F2FA;
            --md-sys-color-surface-container: #F3EDF7;
            --md-sys-color-surface-container-high: #ECE6F0;
            --md-sys-color-surface-container-highest: #E6E0E9;
            
            --md-sys-color-inverse-surface: #313033;
            --md-sys-color-inverse-on-surface: #F4EFF4;
            --md-sys-color-inverse-primary: #D0BCFF;
            
            --md-sys-color-outline: #79747E;
            --md-sys-color-outline-variant: #CAC4D0;
            
            --md-glass-bg: rgba(243, 237, 247, 0.75);
            --md-glass-border: rgba(255, 255, 255, 0.4);
        }

        .dark {
            /* Dark Theme MD3 Tokens - Refined for 2026 OLED/Deep Dark */
            --md-sys-color-primary: #D0BCFF;
            --md-sys-color-on-primary: #381E72;
            --md-sys-color-primary-container: #4F378B;
            --md-sys-color-on-primary-container: #EADDFF;
            
            --md-sys-color-secondary: #CCC2DC;
            --md-sys-color-on-secondary: #332D41;
            --md-sys-color-secondary-container: #4A4458;
            --md-sys-color-on-secondary-container: #E8DEF8;

            --md-sys-color-tertiary: #EFB8C8;
            --md-sys-color-on-tertiary: #492532;
            --md-sys-color-tertiary-container: #633B48;
            --md-sys-color-on-tertiary-container: #FFD8E4;

            --md-sys-color-surface: #141218;
            --md-sys-color-on-surface: #E6E1E5;
            --md-sys-color-surface-variant: #49454F;
            --md-sys-color-on-surface-variant: #CAC4D0;
            
            --md-sys-color-surface-container-lowest: #0F0D13;
            --md-sys-color-surface-container-low: #1D1B20;
            --md-sys-color-surface-container: #211F26;
            --md-sys-color-surface-container-high: #2B2930;
            --md-sys-color-surface-container-highest: #36343B;
            
            --md-sys-color-inverse-surface: #E6E1E5;
            --md-sys-color-inverse-on-surface: #313033;
            --md-sys-color-inverse-primary: #6750A4;
            
            --md-sys-color-outline: #938F99;
            --md-sys-color-outline-variant: #49454F;

            --md-glass-bg: rgba(33, 31, 38, 0.75);
            --md-glass-border: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--md-sys-color-surface);
            color: var(--md-sys-color-on-surface);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            transition: background-color 0.5s cubic-bezier(0.2, 0, 0, 1), color 0.5s ease;
            overflow-x: hidden;
        }

        /* Yükseltilmiş MD3 State Layer (Ripple Etkisi) */
        .md-state-layer {
            position: relative;
            overflow: hidden;
            isolation: isolate;
        }
        .md-state-layer::after {
            content: '';
            position: absolute;
            inset: 0;
            background-color: currentColor;
            opacity: 0;
            transition: opacity 0.25s cubic-bezier(0.2, 0, 0, 1);
            pointer-events: none;
            border-radius: inherit;
            z-index: -1;
        }
        .md-state-layer:hover::after { opacity: 0.08; }
        .md-state-layer:focus-visible::after { opacity: 0.12; }
        .md-state-layer:active::after { opacity: 0.16; }

        /* 2026 MD3 Tonal Elevation Gölgeleri (Daha organik ve yumuşak) */
        .md-elevation-1 { box-shadow: 0px 1px 3px 1px rgba(0, 0, 0, 0.05), 0px 1px 2px 0px rgba(0, 0, 0, 0.1); }
        .md-elevation-2 { box-shadow: 0px 2px 6px 2px rgba(0, 0, 0, 0.05), 0px 1px 2px 0px rgba(0, 0, 0, 0.1); }
        .md-elevation-3 { box-shadow: 0px 4px 8px 3px rgba(0, 0, 0, 0.05), 0px 1px 3px 0px rgba(0, 0, 0, 0.1); }

        .dark .md-elevation-1 { box-shadow: 0px 1px 3px 1px rgba(0, 0, 0, 0.2), 0px 1px 2px 0px rgba(0, 0, 0, 0.4); }
        .dark .md-elevation-2 { box-shadow: 0px 2px 6px 2px rgba(0, 0, 0, 0.2), 0px 1px 2px 0px rgba(0, 0, 0, 0.4); }
        .dark .md-elevation-3 { box-shadow: 0px 4px 8px 3px rgba(0, 0, 0, 0.2), 0px 1px 3px 0px rgba(0, 0, 0, 0.4); }

        /* Glassmorphism Surface (2026 Trendi) */
        .md-glass {
            background: var(--md-glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--md-glass-border);
        }

        /* Organik Kart Etkileşimi */
        .md-card {
            transition: transform 0.5s cubic-bezier(0.2, 0, 0, 1), box-shadow 0.5s cubic-bezier(0.2, 0, 0, 1), background-color 0.4s ease;
        }
        .md-card:hover {
            transform: translateY(-6px) scale(1.01);
            z-index: 10;
        }

        /* Görüntü Büyüme Animasyonu */
        .md-img-scale img {
            transition: transform 0.7s cubic-bezier(0.2, 0, 0, 1);
        }
        .md-card:hover .md-img-scale img {
            transform: scale(1.08);
        }

        ::selection {
            background-color: var(--md-sys-color-primary-container);
            color: var(--md-sys-color-on-primary-container);
        }

        /* Modal / Bottom Sheet Animasyonları */
        .modal-backdrop-anim {
            transition: opacity 0.4s cubic-bezier(0.2, 0, 0, 1), backdrop-filter 0.4s ease;
        }
        
        /* Arka plan ışık huzmesi */
        .hero-glow {
            position: absolute;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, var(--md-sys-color-primary-container) 0%, transparent 60%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.4;
            filter: blur(80px);
            z-index: -1;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        .dark .hero-glow { opacity: 0.15; }

    </style>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'system-ui', 'sans-serif'],
                        display: ['Fraunces', 'serif'],
                    },
                    colors: {
                        md: {
                            primary: 'var(--md-sys-color-primary)',
                            onPrimary: 'var(--md-sys-color-on-primary)',
                            primaryContainer: 'var(--md-sys-color-primary-container)',
                            onPrimaryContainer: 'var(--md-sys-color-on-primary-container)',
                            secondary: 'var(--md-sys-color-secondary)',
                            onSecondary: 'var(--md-sys-color-on-secondary)',
                            secondaryContainer: 'var(--md-sys-color-secondary-container)',
                            onSecondaryContainer: 'var(--md-sys-color-on-secondary-container)',
                            tertiary: 'var(--md-sys-color-tertiary)',
                            onTertiary: 'var(--md-sys-color-on-tertiary)',
                            tertiaryContainer: 'var(--md-sys-color-tertiary-container)',
                            onTertiaryContainer: 'var(--md-sys-color-on-tertiary-container)',
                            surface: 'var(--md-sys-color-surface)',
                            onSurface: 'var(--md-sys-color-on-surface)',
                            surfaceVariant: 'var(--md-sys-color-surface-variant)',
                            onSurfaceVariant: 'var(--md-sys-color-on-surface-variant)',
                            surfaceContainerLowest: 'var(--md-sys-color-surface-container-lowest)',
                            surfaceContainerLow: 'var(--md-sys-color-surface-container-low)',
                            surfaceContainer: 'var(--md-sys-color-surface-container)',
                            surfaceContainerHigh: 'var(--md-sys-color-surface-container-high)',
                            surfaceContainerHighest: 'var(--md-sys-color-surface-container-highest)',
                            inverseSurface: 'var(--md-sys-color-inverse-surface)',
                            inverseOnSurface: 'var(--md-sys-color-inverse-on-surface)',
                            inversePrimary: 'var(--md-sys-color-inverse-primary)',
                            outline: 'var(--md-sys-color-outline)',
                            outlineVariant: 'var(--md-sys-color-outline-variant)',
                        }
                    },
                    borderRadius: {
                        'md-card': '32px', /* MD3 2026 Extra Large Card */
                        'md-modal': '36px', /* MD3 Bottom Sheet */
                    },
                    animation: {
                        'spring-up': 'springUp 1s cubic-bezier(0.175, 0.885, 0.32, 1.1) forwards',
                        'fade-in': 'fadeIn 0.8s ease forwards',
                    },
                    keyframes: {
                        springUp: {
                            '0%': { opacity: 0, transform: 'translateY(40px)' },
                            '100%': { opacity: 1, transform: 'translateY(0)' },
                        },
                        fadeIn: {
                            '0%': { opacity: 0 },
                            '100%': { opacity: 1 },
                        }
                    }
                }
            }
        }
    </script>
</head>

    <!-- Uygulama Mantığı (Görsel ve Fonksiyonel İşlevler) -->
    <script>
        // --- Gelişmiş Çeviri Sistemi ---
        const translations = {
            tr: {
                "hero-title-1": "Dijital dünyada",
                "hero-title-2": "anlamlı izler bırakıyoruz.",
                "hero-desc": "Nevmara, insan odaklı, estetik ve işlevsel yazılımlar geliştiren bağımsız bir stüdyodur. Karmaşadan uzak, amaca hizmet eden dijital deneyimler tasarlıyoruz.",
                "hero-cta-1": "Uygulamaları Keşfet",
                "hero-cta-2": "Manifestomuzu Oku",
                
                "nav-traces": "Projeler",
                "nav-soul": "Felsefemiz",
                
                "projects-title": "Ürettiklerimiz",
                
                "vakitler-desc": "Namaz vakti uygulamamız, günlük ibadetlerinizi eksiksiz ve kolayca takip etmenize yardımcı olmak için kapsamlı özelliklerle donatılmıştır.",
                "vakitler-cta": "Google Play'de İncele",
                
                "falling-desc": "Dünyada yaşanacak yer kalmayınca hayvanlar bulutlara sığındı. Ancak bir sorun var: hayvanlar bulutlardan düşmeye başlıyor!",

                "ghost-desc": "Great Ghost ile heyecan verici bir maceraya atılın! Zorlu sütunlar arasında gezinen oyuncu bir hayalete rehberlik edin.",
                "ghost-cta": "Oyunu İndir",

                "sudoku-desc": "Zihninizi dinlendirin ve mantığınızı geliştirin! Sudoku, her yaştan bulmaca sever için tasarlanmış, modern ve kullanıcı dostu bir arayüze sahip klasik bir sayı bulmaca oyunudur.",
                "sudoku-cta": "Oyunu İndir",

                "manifesto-title": "Karmaşadan Uzak, Öze Odaklı.",
                "manifesto-p1": "Teknolojinin amacı hayatı zorlaştırmak, bildirimlerle zihni yormak veya zamanı çalmak değil; aksine hayatı daha anlamlı ve yönetilebilir kılmaktır.",
                "manifesto-p2": "Biz Nevmara olarak, kullanıcının vaktine, mahremiyetine ve zihnine saygı duyan araçlar üretiyoruz. Algoritmaların kölesi olmayan, kendi isteğinizle açıp huzurla kapattığınız uygulamalar.",
                "manifesto-p3": "Sade, güçlü ve sessizce işini yapan yazılımlar tasarlamaya inanıyoruz.",

                "footer-tagline": "Dijital dünyada anlamlı izler bırakan bağımsız bir stüdyo.",
                "footer-contact": "İrtibat Kurun",
                "footer-email": "E-Posta Gönder",
                "footer-docs": "Yasal Belgeler",
                "footer-privacy": "Uygulama Gizlilik Politikaları",

                "modal-privacy-title": "Uygulama Gizlilik Politikaları",
                "modal-scope-note": "Bu metinler web sitesi için değil, Nevmara mobil uygulamaları için geçerlidir.",
                "modal-loading": "Belge sunucudan alınıyor..."
            },
            en: {
                "hero-title-1": "Leaving meaningful",
                "hero-title-2": "traces in the digital world.",
                "hero-desc": "Nevmara is an independent studio developing human-centric, aesthetic, and functional software. We design digital experiences that serve a purpose, far from the chaos.",
                "hero-cta-1": "Explore Apps",
                "hero-cta-2": "Read Manifesto",
                
                "nav-traces": "Projects",
                "nav-soul": "Philosophy",
                
                "projects-title": "Our Creations",
                
                "vakitler-desc": "Our prayer time app is packed with comprehensive features to help you keep track of your daily prayers easily and without missing a beat.",
                "vakitler-cta": "View on Google Play",
                
                "falling-desc": "When there was no place left to live on Earth, the animals took refuge in the clouds. But there’s a problem: the animals are starting to fall from the clouds!",
                "falling-cta": "Download Game",
                
                "ghost-desc": "Embark on an exciting adventure with Great Ghost! Guide a ghost as it navigates through challenging columns.",
                "ghost-cta": "Download Game",

                "sudoku-desc": "Give your mind a break and sharpen your logic! Sudoku is a classic number puzzle game designed for puzzle lovers of all ages, featuring a modern and user-friendly interface.",
                "sudoku-cta": "View on Google Play",

                "manifesto-title": "Away from Chaos, Focused on Core.",
                "manifesto-p1": "The purpose of technology is not to complicate life, exhaust the mind with notifications, or steal time; but rather to make life more meaningful and manageable.",
                "manifesto-p2": "At Nevmara, we build tools that respect the user's time, privacy, and mind. Applications that aren't slaves to algorithms, which you open willingly and close peacefully.",
                "manifesto-p3": "We believe in designing software that is simple, powerful, and quietly does its job.",

                "footer-tagline": "An independent studio leaving meaningful traces in the digital realm.",
                "footer-contact": "Get in Touch",
                "footer-email": "Send an Email",
                "footer-docs": "Legal Documents",
                "footer-privacy": "App Privacy Policies",

                "modal-privacy-title": "App Privacy Policies",
                "modal-scope-note": "These documents apply to Nevmara mobile applications, not this website.",
                "modal-loading": "Fetching document from server..."
            }
        };

        let currentLang = localStorage.getItem('lang') || 'tr';

        function updateLanguage(lang) {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang] && translations[lang][key]) {
                    // Span veya metin içeriyorsa bozmamak için sadece textContent değiştir
                    if(el.children.length === 0) {
                        el.textContent = translations[lang][key];
                    } else {
                        // Eğer içinde ok simgesi gibi öğeler varsa, baştaki metin düğümünü güncelle
                        el.childNodes[0].nodeValue = translations[lang][key] + " ";
                    }
                }
            });
            document.getElementById('lang-toggle').textContent = lang === 'tr' ? 'EN' : 'TR';
            document.documentElement.lang = lang;
            localStorage.setItem('lang', lang);

            const modal = document.getElementById('privacy-modal');
            if (modal && !modal.classList.contains('hidden')) {
                fetchPrivacy();
            }
        }

        document.getElementById('lang-toggle').addEventListener('click', () => {
            currentLang = currentLang === 'tr' ? 'en' : 'tr';
            updateLanguage(currentLang);
        });

        // Başlangıç dilini ayarla
        updateLanguage(currentLang);

        // --- Işık/Karanlık Tema Mantığı (MD3 Akıcı Geçiş) ---
        const htmlEl = document.documentElement;
        const themeToggleIcon = document.getElementById('theme-toggle').querySelector('svg');
        
        const updateThemeIcon = (isDark) => {
            if(isDark) {
                // Güneş ikonu (Daha yumuşak hatlı)
                themeToggleIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>';
            } else {
                // Ay ikonu
                themeToggleIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>';
            }
        };

        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            htmlEl.classList.add('dark');
            updateThemeIcon(true);
        }

        document.getElementById('theme-toggle').addEventListener('click', () => {
            htmlEl.classList.toggle('dark');
            const isDark = htmlEl.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeIcon(isDark);
        });

        // --- MD3 2026 Uyumlu Gizlilik Modalı Mantığı ---
        const modal = document.getElementById('privacy-modal');
        const panel = document.getElementById('modal-panel');
        const openBtn = document.getElementById('open-privacy');
        const closeBtn = document.getElementById('close-privacy-btn');
        const backdrop = document.getElementById('modal-backdrop');
        const contentArea = document.getElementById('privacy-content-area');
        let lastFocusedElement = null;

        async function fetchPrivacy() {
            try {
                contentArea.innerHTML = `
                    <div class="flex items-center gap-3 animate-pulse text-md-primary h-32 justify-center">
                        <div class="w-6 h-6 border-4 border-md-primary border-t-transparent rounded-full animate-spin"></div>
                        <span class="font-bold">${translations[currentLang]["modal-loading"]}</span>
                    </div>`;
                const fileName = currentLang === 'tr' ? 'PRIVACY_tr.md' : 'PRIVACY_en.md';
                const res = await fetch(fileName);
                
                if (res.ok) {
                    const text = await res.text();
                    // Markdown'ı parse et, MD3 tipografi sınıfları kapsayıcı (prose) tarafından yönetilir
                    contentArea.innerHTML = marked.parse(text);
                } else {
                    contentArea.innerHTML = currentLang === 'tr' 
                        ? `<h3 class="text-xl font-bold">Gizlilik Politikası</h3><p>Şu anda bu dile ait gizlilik politikası dosyası bulunamadı. Lütfen daha sonra tekrar deneyin.</p>`
                        : `<h3 class="text-xl font-bold">Privacy Policy</h3><p>Privacy policy file could not be found for this language. Please try again later.</p>`;
                }
            } catch {
                contentArea.innerHTML = currentLang === 'tr' 
                    ? "<p class='text-red-500'>Dosya yüklenirken bir ağ hatası oluştu.</p>" 
                    : "<p class='text-red-500'>A network error occurred while loading.</p>";
            }
        }

        function toggleModal(show) {
            if(show) {
                lastFocusedElement = document.activeElement;
                modal.classList.remove('hidden');
                modal.classList.add('flex');
                document.body.style.overflow = 'hidden'; // Arka plan kaydırmayı engelle
                fetchPrivacy();
                
                // MD3 2026 Akıcı Giriş Animasyonları (Spring benzeri)
                requestAnimationFrame(() => {
                    backdrop.classList.remove('opacity-0');
                    backdrop.classList.add('opacity-100');
                    panel.classList.remove('translate-y-full');
                    closeBtn.focus();
                });
            } else {
                panel.classList.add('translate-y-full');
                backdrop.classList.remove('opacity-100');
                backdrop.classList.add('opacity-0');
                
                setTimeout(() => {
                    modal.classList.add('hidden');
                    modal.classList.remove('flex');
                    document.body.style.overflow = '';
                    if (lastFocusedElement && typeof lastFocusedElement.focus === 'function') {
                        lastFocusedElement.focus();
                    }
                }, 500); // Animasyon süresi (md3 2026 timing)
            }
        }

        openBtn.addEventListener('click', () => toggleModal(true));
        closeBtn.addEventListener('click', () => toggleModal(false));
        backdrop.addEventListener('click', () => toggleModal(false));

        // URL'den kontrol
        function shouldOpenPrivacyFromUrl() {
            const params = new URLSearchParams(window.location.search);
            const openParam = (params.get('open') || '').toLowerCase();
            const hash = (window.location.hash || '').toLowerCase();
            return openParam === 'privacy' || hash === '#privacy';
        }

        if (shouldOpenPrivacyFromUrl()) {
            setTimeout(() => toggleModal(true), 800); // Sayfa yüklendikten sonra zarifçe açıl
        }

        // ESC tuşu ile kapatma
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && !modal.classList.contains('hidden')) {
                toggleModal(false);
            }
        });

        // MD3 2026 Kaydırma İle Beliren Öğeler (Geliştirilmiş Intersection Observer)
        const observerOptions = {
            threshold: 0.15,
            rootMargin: '0px 0px -50px 0px'
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.animationPlayState = 'running';
                    observer.unobserve(entry.target);
                }
            });
        }, observerOptions);

        document.querySelectorAll('.animate-spring-up').forEach(el => {
            el.style.animationPlayState = 'paused';
            observer.observe(el);
        });
    </script>
